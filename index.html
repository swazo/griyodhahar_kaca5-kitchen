```html
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Closing Kitchen</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #f5f5f5;
  padding: 20px;
}

.card {
  max-width: 1000px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,.08);
}

h2 {
  text-align: center;
  margin-bottom: 25px;
}

.top {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 15px;
  margin-bottom: 25px;
}

label {
  display: block;
  margin-bottom: 6px;
  font-weight: bold;
}

input,
select {
  padding: 12px;
  width: 100%;
  border: 1px solid #ddd;
  border-radius: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #222;
  color: white;
  padding: 12px;
}

td {
  padding: 10px;
  border-bottom: 1px solid #eee;
  text-align: center;
}

.qty-wrap {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 5px;
}

.qty {
  width: 70px;
  text-align: center;
  padding: 8px;
}

.plus,
.minus {
  width: 35px;
  height: 35px;
  padding: 0;
  margin: 0;
  border: none;
  border-radius: 8px;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

.plus {
  background: #16a34a;
}

.minus {
  background: #dc2626;
}

#btnSimpan {
  width: 100%;
  padding: 15px;
  background: #16a34a;
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  margin-top: 20px;
  cursor: pointer;
}

#btnSimpan:disabled {
  opacity: .6;
}

@media (max-width: 700px) {
  .top {
    grid-template-columns: 1fr;
  }

  body {
    padding: 10px;
  }

  .card {
    padding: 15px;
  }

  th,
  td {
    padding: 8px 4px;
    font-size: 13px;
  }

  .qty {
    width: 55px;
  }
}
</style>
</head>

<body>

<div class="card">

  <h2>🍹 Closing Kitchen</h2>

  <div class="top">

    <div>
      <label for="tanggal">Tanggal</label>
      <input type="date" id="tanggal">
    </div>

    <div>
      <label for="shift">Shift</label>
      <select id="shift">
        <option value="">Pilih Shift</option>
        <option value="Shift 1">Shift 1</option>
        <option value="Shift 2">Shift 2</option>
      </select>
    </div>

    <div>
      <label for="petugas">Nama Petugas</label>
      <input
        type="text"
        id="petugas"
        placeholder="Masukkan nama"
      >
    </div>

  </div>

  <table>
    <thead>
      <tr>
        <th>Barang</th>
        <th>Satuan</th>
        <th>Keluar</th>
      </tr>
    </thead>

    <tbody id="listBarang"></tbody>
  </table>

  <button
    type="button"
    id="btnSimpan"
    onclick="simpan()"
  >
    💾 Simpan Closing
  </button>

</div>


<script>
const SCRIPT_URL =
  "https://script.google.com/macros/s/AKfycby0uXUuDjDDwXKkj2C2cbXwboCK-TvKjFIkjqgRT-c941CPgWJ6iHmV7pi_aGE0QR37/exec";


const barang = [
  { nama: "AYAM 0.9KG", satuan: "ekor" },
  { nama: "AYAM 1.1KG", satuan: "ekor" },
  { nama: "BEBEK 1.4KG", satuan: "ekor" },
  { nama: "PAHA AYAM BONELESS", satuan: "pack" },
  { nama: "DORI FILLET", satuan: "pack" },
  { nama: "JAMUR", satuan: "pack" },
  { nama: "IKAN MAS GORENG", satuan: "ekor" },
  { nama: "IKAN MAS HOTPLATE", satuan: "ekor" },
  { nama: "IKAN NILA GORENG", satuan: "ekor" },
  { nama: "IKAN NILA HOTPLATE", satuan: "ekor" },
  { nama: "IKAN LELE", satuan: "ekor" },
  { nama: "IKAN GURAME", satuan: "ekor" }
];


function setTanggalHariIni() {
  const sekarang = new Date();

  const tahun = sekarang.getFullYear();
  const bulan = String(sekarang.getMonth() + 1).padStart(2, "0");
  const hari = String(sekarang.getDate()).padStart(2, "0");

  document.getElementById("tanggal").value =
    `${tahun}-${bulan}-${hari}`;
}


function tampilkanBarang() {

  const tbody = document.getElementById("listBarang");

  let html = "";

  barang.forEach(function(b, i) {

    html += `
      <tr>

        <td>${b.nama}</td>

        <td>${b.satuan}</td>

        <td>
          <div class="qty-wrap">

            <button
              type="button"
              class="minus"
              onclick="kurang(${i})"
            >
              −
            </button>

            <input
              type="number"
              min="0"
              step="1"
              value="0"
              id="qty${i}"
              class="qty"
            >

            <button
              type="button"
              class="plus"
              onclick="tambah(${i})"
            >
              +
            </button>

          </div>
        </td>

      </tr>
    `;
  });

  tbody.innerHTML = html;
}


function tambah(i) {

  const el =
    document.getElementById("qty" + i);

  const nilai =
    parseInt(el.value, 10) || 0;

  el.value = nilai + 1;
}


function kurang(i) {

  const el =
    document.getElementById("qty" + i);

  let nilai =
    parseInt(el.value, 10) || 0;

  nilai = nilai - 1;

  if (nilai < 0) {
    nilai = 0;
  }

  el.value = nilai;
}


async function simpan() {

  const btn =
    document.getElementById("btnSimpan");

  const tanggal =
    document.getElementById("tanggal").value;

  const shift =
    document.getElementById("shift").value;

  const petugas =
    document.getElementById("petugas").value.trim();


  if (!tanggal) {
    alert("Isi tanggal");
    document.getElementById("tanggal").focus();
    return;
  }


  if (!shift) {
    alert("Pilih shift");
    document.getElementById("shift").focus();
    return;
  }


  if (!petugas) {
    alert("Isi nama petugas");
    document.getElementById("petugas").focus();
    return;
  }


  const barangTerisi =
    barang
      .map(function(b, i) {

        const qty =
          parseInt(
            document.getElementById("qty" + i).value,
            10
          ) || 0;

        return {
          nama: b.nama,
          satuan: b.satuan,
          qty: qty
        };

      })
      .filter(function(item) {
        return item.qty > 0;
      });


  if (barangTerisi.length === 0) {
    alert("Isi minimal 1 qty");
    return;
  }


  const data = {
    tanggal: tanggal,
    shift: shift,
    petugas: petugas,
    barang: barangTerisi
  };


  btn.disabled = true;
  btn.textContent = "⏳ Menyimpan...";


  try {

    await fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify(data)
    });


    alert("Data berhasil dikirim");

    btn.textContent = "✅ Berhasil";


    setTimeout(function() {
      location.reload();
    }, 1000);


  } catch (err) {

    console.error(err);

    alert(
      "Gagal mengirim data: " +
      err.message
    );

    btn.disabled = false;

    btn.textContent =
      "💾 Simpan Closing";
  }
}


document.addEventListener(
  "DOMContentLoaded",
  function() {

    setTanggalHariIni();

    tampilkanBarang();

  }
);
</script>

</body>
</html>
